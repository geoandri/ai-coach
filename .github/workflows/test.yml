name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      # TODO: re-enable detekt once a release supports Kotlin 1.9.25
      # - name: Run detekt
      #   working-directory: backend
      #   run: ./gradlew detekt

      - name: Run tests
        working-directory: backend
        run: ./gradlew test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Backend Tests
          path: backend/build/test-results/test/*.xml
          reporter: java-junit

  frontend-test:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Frontend Tests
          path: frontend/test-results/*.xml
          reporter: java-junit
