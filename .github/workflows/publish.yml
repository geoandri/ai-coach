name: Build and Publish Docker Images

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'

env:
  REGISTRY: ghcr.io
  OWNER: geoandri

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            platform: linux/amd64
          - runner: ubuntu-24.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend digest
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/backend:${{ github.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-from: type=gha,scope=backend-${{ matrix.platform }}
          cache-to: type=gha,scope=backend-${{ matrix.platform }},mode=max

      - name: Build and push frontend digest
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          platforms: ${{ matrix.platform }}
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/frontend:${{ github.sha }}-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          cache-from: type=gha,scope=frontend-${{ matrix.platform }}
          cache-to: type=gha,scope=frontend-${{ matrix.platform }},mode=max

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push backend manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/backend:latest \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/backend:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/backend:${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/backend:${{ github.sha }}-arm64

      - name: Create and push frontend manifest
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/frontend:latest \
            --tag ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/frontend:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/frontend:${{ github.sha }}-amd64 \
            ${{ env.REGISTRY }}/${{ env.OWNER }}/ai-coach/frontend:${{ github.sha }}-arm64
