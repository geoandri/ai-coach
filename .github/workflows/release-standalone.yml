name: Release Standalone

on:
  push:
    branches:
      - node-standalone
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            mcp/package-lock.json
            server/package-lock.json

      # ── Build frontend ────────────────────────────────────────────────────
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # ── Build MCP ─────────────────────────────────────────────────────────
      - name: Build MCP
        working-directory: mcp
        run: |
          npm ci
          npm run build

      # ── Build server ──────────────────────────────────────────────────────
      - name: Build server
        working-directory: server
        run: |
          npm ci
          npm run build

      # ── Install server prod deps ──────────────────────────────────────────
      # sql.js is pure WASM — no native binaries, works on any platform
      - name: Install server production dependencies
        working-directory: server
        run: npm ci --omit=dev

      # ── Install MCP prod deps ─────────────────────────────────────────────
      - name: Install MCP production dependencies
        working-directory: mcp
        run: npm ci --omit=dev

      # ── Assemble tarball ──────────────────────────────────────────────────
      - name: Assemble release directory
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_DIR="ai-coach-standalone"

          mkdir -p "${RELEASE_DIR}/mcp"

          # Server compiled JS
          cp -r server/dist "${RELEASE_DIR}/dist"

          # Server prod node_modules (pure JS/WASM, works on all platforms)
          cp -r server/node_modules "${RELEASE_DIR}/node_modules"

          # Server package.json (needed for "type": "module")
          cp server/package.json "${RELEASE_DIR}/package.json"

          # Frontend static files
          cp -r frontend/dist "${RELEASE_DIR}/public"

          # MCP compiled JS + prod deps
          cp -r mcp/dist "${RELEASE_DIR}/mcp/dist"
          cp -r mcp/node_modules "${RELEASE_DIR}/mcp/node_modules"
          cp mcp/package.json "${RELEASE_DIR}/mcp/package.json"

          # Personas
          mkdir -p "${RELEASE_DIR}/personas"
          if [ -d docs/personas ]; then
            cp -r docs/personas/. "${RELEASE_DIR}/personas/"
          fi

          # Env example
          cp server/.env.example "${RELEASE_DIR}/.env.example"

          # README stub
          cat > "${RELEASE_DIR}/README.md" <<'EOF'
# AI Coach Standalone

AI Coach is a personal coaching platform where an AI agent interviews athletes, pulls training
history from Strava, generates periodized training plans, and tracks week-by-week adherence.
The AI runs in Claude via MCP — this package contains the backend server and coaching dashboard.

## Requirements

Node.js 18 or later. No native dependencies — works on macOS, Linux, and Windows.

## Setup

### 1. Create a Strava API application

1. Go to https://www.strava.com/settings/api
2. Create a new application
3. Set **Authorization Callback Domain** to `localhost`
4. Note your **Client ID** and **Client Secret**

### 2. Configure environment variables

**macOS / Linux**
```bash
cp .env.example .env
```

**Windows (Command Prompt)**
```cmd
copy .env.example .env
```

**Windows (PowerShell)**
```powershell
Copy-Item .env.example .env
```

Open `.env` and fill in your Strava credentials:

```
STRAVA_CLIENT_ID=your_client_id
STRAVA_CLIENT_SECRET=your_client_secret
STRAVA_REDIRECT_URI=http://localhost:3000/api/auth/strava/callback
```

The other values (`PORT`, `DATABASE_PATH`, etc.) can be left as defaults.

### 3. Start the server

**macOS / Linux**
```bash
node dist/index.js
```

**Windows (Command Prompt / PowerShell)**
```cmd
node dist\index.js
```

Open http://localhost:3000. The coaching dashboard and MCP server start together.
The MCP server is reachable at http://localhost:3001/mcp.

## MCP Setup

The MCP server starts automatically alongside the app — you do not need to configure a path
or run it separately. Just make sure the app is running before starting a coaching session.

### Claude Desktop

Add the following to your Claude Desktop config file:

**macOS**: `~/Library/Application Support/Claude/claude_desktop_config.json`
**Windows**: `%APPDATA%\Claude\claude_desktop_config.json`

```json
{
  "mcpServers": {
    "ai-coach": {
      "command": "npx",
      "args": ["mcp-remote", "http://localhost:3001/mcp"]
    }
  }
}
```

Restart Claude Desktop after saving the file.

### Claude Code

Run once (from any directory):

```bash
claude mcp add --transport http ai-coach http://localhost:3001/mcp
```

## Starting a coaching session

1. Start the app (`node dist/index.js`)
2. Open a new conversation in Claude Desktop or Claude Code
3. Select a coach persona from the AI Coach connector (plug icon) — e.g. `trail-running-coach`
4. Claude will guide the session from there

## Data

The SQLite database is stored at `./data/ai_coach.db` by default.
To use a different location set the `DATABASE_PATH` environment variable in `.env`.

## All environment variables

| Variable | Default | Description |
|---|---|---|
| `PORT` | `3000` | Port for the web server and dashboard |
| `MCP_PORT` | `3001` | Port for the MCP server |
| `DATABASE_PATH` | `./data/ai_coach.db` | Path to the SQLite database file |
| `STRAVA_CLIENT_ID` | — | Strava application client ID |
| `STRAVA_CLIENT_SECRET` | — | Strava application client secret |
| `STRAVA_REDIRECT_URI` | `http://localhost:3000/api/auth/strava/callback` | Strava OAuth callback URL |
| `FRONTEND_BASE_URL` | `http://localhost:3000` | Base URL used for post-OAuth redirects |
EOF

          tar -czf "ai-coach-standalone-${TAG}.tar.gz" "${RELEASE_DIR}/"

      # ── Upload artifact on every push (CI) ───────────────────────────────
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-coach-standalone
          path: ai-coach-standalone-*.tar.gz
          retention-days: 7

      # ── Create GitHub Release on tag push ─────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ai-coach-standalone-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
