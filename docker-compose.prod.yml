services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_coach}
      POSTGRES_USER: ${POSTGRES_USER:-ai_coach_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_coach_pass}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_coach_user} -d ${POSTGRES_DB:-ai_coach}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/geoandri/ai-coach/backend:latest
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ai_coach}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-ai_coach_user}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-ai_coach_pass}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:-http://localhost/api/auth/strava/callback}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  mcp:
    image: ghcr.io/geoandri/ai-coach/mcp:latest
    environment:
      BACKEND_URL: http://backend:8080/api
      PUBLIC_URL: ${PUBLIC_URL:-http://localhost/api}
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/geoandri/ai-coach/frontend:latest
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
